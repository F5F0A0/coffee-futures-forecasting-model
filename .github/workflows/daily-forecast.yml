name: daily-forecast

# When to run:
#   - 21:00 UTC weekdays = ~16–17:00 ET (after ICE coffee settles)
#   - workflow_dispatch lets us trigger manually from the Actions tab
on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}

# Required so the job can push the updated CSV/PNG back to the repo.
# Also requires: Settings -> Actions -> General -> Workflow permissions
#                -> "Read and write permissions" must be enabled.
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # requirements.txt installs third-party deps; `pip install -e . --no-deps`
        # installs the coffee_forecast package itself so scripts/run_forecast.py
        # can `from coffee_forecast import ...`.
        run: |
          pip install -r requirements.txt
          pip install -e . --no-deps

      - name: Run forecast
        run: |
          python scripts/run_forecast.py
          python -c "import pandas as pd; print(pd.read_csv('forecasts/latest_forecast.csv')['run_date'].iloc[0])" > /tmp/run_date

      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add forecasts/latest_forecast.csv forecasts/latest_forecast.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            RUN_DATE=$(cat /tmp/run_date)
            git commit -m "forecast: $RUN_DATE"
            git push
          fi